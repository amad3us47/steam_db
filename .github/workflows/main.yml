name: Steam Scraper

on:
  workflow_dispatch:  # run manually from GitHub Actions tab
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Download existing db
        uses: actions/cache@v3
        with:
          path: games.db
          key: games-db-${{ github.run_id }}
          restore-keys: games-db-

      - name: Run scraper
        run: python fetch.py

      - name: Upload db as artifact
        uses: actions/upload-artifact@v3
        with:
          name: games-db
          path: games.db
